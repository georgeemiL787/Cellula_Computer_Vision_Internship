# Run from repo root: docker compose -f water_segmentation_api/docker-compose.yml up -d
# Build: docker compose -f water_segmentation_api/docker-compose.yml build

services:
  api:
    build:
      context: .
      dockerfile: water_segmentation_api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/best_model.pth
      - DEVICE=cpu
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
